# HTS ingestion pipeline (manual dispatch until S3 upload is wired).
# Run from GitHub Actions UI: workflow_dispatch

name: Ingest HTS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "HTS release version (e.g. 2026HTSRev6)"
        required: true
      activate:
        description: "Activate release after successful ingest"
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m backend.scripts.ingest_local \
            --version "${{ inputs.version }}" \
            --skip-parse \
            ${{ inputs.activate && '--activate' || '' }}
